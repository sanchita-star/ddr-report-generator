<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .app {
    font-family: 'DM Sans', sans-serif;
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 0;
  }

  .header {
    border-bottom: 0.5px solid var(--color-border-tertiary);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    width: 32px; height: 32px;
    background: var(--color-background-info);
    border-radius: var(--border-radius-md);
    display: flex; align-items: center; justify-content: center;
  }

  .header-icon svg { width: 18px; height: 18px; stroke: var(--color-text-info); fill: none; stroke-width: 2; }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-left: auto;
    background: var(--color-background-secondary);
    padding: 3px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--color-border-tertiary);
  }

  .main { padding: 1.5rem; }

  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .upload-zone {
    border: 1.5px dashed var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    padding: 1.25rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--color-background-primary);
    position: relative;
  }

  .upload-zone:hover { border-color: var(--color-border-info); background: var(--color-background-info); }
  .upload-zone.has-file { border-style: solid; border-color: var(--color-border-success); background: var(--color-background-success); }
  .upload-zone.drag-over { border-color: var(--color-border-info); background: var(--color-background-info); }

  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .upload-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .upload-icon { font-size: 20px; margin-bottom: 6px; }

  .upload-name {
    font-size: 13px;
    color: var(--color-text-primary);
    font-weight: 500;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .upload-hint { font-size: 12px; color: var(--color-text-tertiary); }

  .generate-btn {
    width: 100%;
    padding: 13px;
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border: none;
    border-radius: var(--border-radius-md);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-bottom: 1.5rem;
    letter-spacing: 0.01em;
  }

  .generate-btn:hover { opacity: 0.85; }
  .generate-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--color-background-info);
    border: 0.5px solid var(--color-border-info);
    border-radius: var(--border-radius-md);
    font-size: 13px;
    color: var(--color-text-info);
    margin-bottom: 1.5rem;
  }

  .status-bar.visible { display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--color-border-info);
    border-top-color: var(--color-text-info);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .report-container { display: none; }
  .report-container.visible { display: block; }

  .report-header {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .report-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .report-meta { font-size: 12px; color: var(--color-text-secondary); }

  .download-btn {
    padding: 7px 16px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .download-btn:hover { background: var(--color-background-secondary); }

  .severity-chips {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  .chip-red { background: var(--color-background-danger); color: var(--color-text-danger); }
  .chip-amber { background: var(--color-background-warning); color: var(--color-text-warning); }
  .chip-green { background: var(--color-background-success); color: var(--color-text-success); }

  .section-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    margin-bottom: 10px;
    overflow: hidden;
  }

  .section-head {
    padding: 12px 1.25rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .section-num {
    width: 22px; height: 22px;
    background: var(--color-background-secondary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    color: var(--color-text-secondary);
  }

  .section-title { font-size: 14px; font-weight: 500; flex: 1; }

  .section-toggle {
    font-size: 11px;
    color: var(--color-text-tertiary);
  }

  .section-body {
    padding: 1rem 1.25rem;
    font-size: 13px;
    line-height: 1.7;
    color: var(--color-text-secondary);
  }

  .section-body.collapsed { display: none; }

  .section-body p { margin-bottom: 0.75rem; }
  .section-body p:last-child { margin-bottom: 0; }

  .area-block {
    border-left: 2px solid var(--color-border-tertiary);
    padding-left: 12px;
    margin-bottom: 1rem;
  }

  .area-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 4px;
  }

  .severity-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    margin-left: 8px;
  }

  .sev-critical { background: var(--color-background-danger); color: var(--color-text-danger); }
  .sev-moderate { background: var(--color-background-warning); color: var(--color-text-warning); }
  .sev-low { background: var(--color-background-success); color: var(--color-text-success); }

  .action-list { list-style: none; padding: 0; }
  .action-list li {
    padding: 6px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    font-size: 13px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .action-list li:last-child { border: none; }
  .action-dot {
    width: 6px; height: 6px;
    background: var(--color-text-secondary);
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }

  .na-tag {
    font-style: italic;
    color: var(--color-text-tertiary);
    font-size: 12px;
  }

  .error-bar {
    display: none;
    padding: 10px 14px;
    background: var(--color-background-danger);
    border: 0.5px solid var(--color-border-danger);
    border-radius: var(--border-radius-md);
    color: var(--color-text-danger);
    font-size: 13px;
    margin-bottom: 1rem;
  }

  .error-bar.visible { display: block; }
</style>

<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M17 21H7a2 2 0 01-2-2V5a2 2 0 012-2h5l5 5v11a2 2 0 01-2 2z"/><path d="M13 3v5h5"/></svg>
    </div>
    <div class="header-title">DDR Generator</div>
    <div class="header-sub">AI-powered</div>
  </div>

  <div class="main">
    <div class="upload-grid">
      <div class="upload-zone" id="zone1" ondragover="handleDrag(event,'zone1')" ondragleave="handleDragLeave(event,'zone1')" ondrop="handleDrop(event,'zone1','file1')">
        <input type="file" accept=".pdf,.docx,.doc,.txt" onchange="handleFile(event,'zone1','file1','name1')" id="fi1">
        <div class="upload-label">Inspection Report</div>
        <div class="upload-icon" id="icon1">📋</div>
        <div class="upload-name" id="name1">Click or drop PDF here</div>
        <div class="upload-hint" id="hint1">Site observations & issues</div>
      </div>
      <div class="upload-zone" id="zone2" ondragover="handleDrag(event,'zone2')" ondragleave="handleDragLeave(event,'zone2')" ondrop="handleDrop(event,'zone2','file2')">
        <input type="file" accept=".pdf,.docx,.doc,.txt" onchange="handleFile(event,'zone2','file2','name2')" id="fi2">
        <div class="upload-label">Thermal Report</div>
        <div class="upload-icon" id="icon2">🌡️</div>
        <div class="upload-name" id="name2">Click or drop PDF here</div>
        <div class="upload-hint" id="hint2">Temperature & thermal findings</div>
      </div>
    </div>

    <button class="generate-btn" id="genBtn" onclick="generateDDR()">Generate Detailed Diagnostic Report →</button>

    <div class="status-bar" id="statusBar">
      <div class="spinner"></div>
      <span id="statusText">Reading documents and generating DDR...</span>
    </div>

    <div class="error-bar" id="errorBar"></div>

    <div class="report-container" id="reportContainer">
      <div class="report-header">
        <div>
          <div class="report-title">Detailed Diagnostic Report</div>
          <div class="report-meta" id="reportMeta"></div>
        </div>
        <button class="download-btn" onclick="downloadReport()">⬇ Download PDF</button>
      </div>
      <div class="severity-chips" id="severityChips"></div>
      <div id="reportSections"></div>
    </div>
  </div>
</div>

<script>
let files = { file1: null, file2: null };
let reportData = null;

// ---------- FILE HANDLING ----------
function handleFile(e, zoneId, fileKey, nameId) {
  const file = e.target.files[0];
  if (!file) return;
  files[fileKey] = file;
  const zone = document.getElementById(zoneId);
  zone.classList.add('has-file');
  document.getElementById(nameId).textContent = file.name;
  document.getElementById(nameId.replace('name','hint')).textContent =
    (file.size/1024).toFixed(1) + ' KB · ready';
}

function handleDrag(e, zoneId) {
  e.preventDefault();
  document.getElementById(zoneId).classList.add('drag-over');
}

function handleDragLeave(e, zoneId) {
  document.getElementById(zoneId).classList.remove('drag-over');
}

function handleDrop(e, zoneId, fileKey) {
  e.preventDefault();
  document.getElementById(zoneId).classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  files[fileKey] = file;

  const idx = fileKey.replace('file','');
  document.getElementById('name'+idx).textContent = file.name;
  document.getElementById('hint'+idx).textContent =
    (file.size/1024).toFixed(1) + ' KB · ready';
}

// ---------- UI HELPERS ----------
function setStatus(visible, text) {
  const bar = document.getElementById('statusBar');
  if (visible) {
    bar.classList.add('visible');
    document.getElementById('statusText').textContent = text;
  } else {
    bar.classList.remove('visible');
  }
}

function showError(msg) {
  const bar = document.getElementById('errorBar');
  bar.textContent = msg;
  bar.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBar').classList.remove('visible');
}

// ---------- MAIN FUNCTION ----------
async function generateDDR() {
  hideError();

  if (!files.file1 && !files.file2) {
    showError("Please upload at least one document.");
    return;
  }

  const btn = document.getElementById("genBtn");
  btn.disabled = true;
  setStatus(true, "Uploading & processing documents...");

  try {
    const formData = new FormData();

    if (files.file1) formData.append("inspection", files.file1);
    if (files.file2) formData.append("thermal", files.file2);

    const response = await fetch("http://127.0.0.1:5000/generate", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || "Server error");
    }

    setStatus(false);

    // IMPORTANT: backend returns plain text report
    document.getElementById("reportContainer").classList.add("visible");
    document.getElementById("reportSections").innerHTML =
      `<div class="section-card">
         <div class="section-body">
           <pre style="white-space:pre-wrap;font-family:inherit;">${escapeHtml(data.report)}</pre>
         </div>
       </div>`;

  } catch (err) {
    setStatus(false);
    showError("Error: " + err.message);
  } finally {
    btn.disabled = false;
  }
}

// ---------- UTIL ----------
function escapeHtml(text) {
  return text
    ? text.replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
    : "";
}

// ---------- DOWNLOAD ----------
function downloadReport() {
  const text = document.querySelector("pre")?.innerText;
  if (!text) return;

  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "DDR_Report.txt";
  a.click();

  URL.revokeObjectURL(url);
}
</script>
